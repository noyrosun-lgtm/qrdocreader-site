<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR DOC READER – Installer appen</title>
  <style>
    :root {
      --bg1: #eef3fb;
      --bg2: #dfe9f8;
      --card: #ffffff;
      --text: #12325f;
      --muted: #5c6f8c;
      --primary: #0f3b78;
      --primary-2: #1f6dd0;
      --border: #d7e2f1;
      --shadow: 0 18px 50px rgba(15, 59, 120, 0.14);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrap {
      color: #555;
      margin-bottom: 22px;
      line-height: 1.5;
      font-size: 1.05rem;
    }

    .card {
      background: white;
      padding: 42px 34px;
      border-radius: 24px;
      text-align: center;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 12px 28px rgba(0,0,0,0.10);
    }

    .logo {
      width: 220px;
      max-width: 70%;
      height: auto;
      margin: 0 auto 22px;
      display: block;
      border-radius: 28px;
    }

    h1 {
      margin: 8px 0 12px;
      font-size: 2.2rem;
      line-height: 1.1;
    }

    .subtitle {
      margin: 10px auto 0;
      max-width: 460px;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.6;
    }

    .status {
      margin: 18px 0;
      font-size: 15px;
      color: #666;
    }

    .buttons {
      display: grid;
      gap: 12px;
      margin-top: 4px;
    }

    .btn {
      display: block;
      margin: 12px 0;
      padding: 16px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.05rem;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(15, 59, 120, 0.12);
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
    }

    .btn-secondary {
      color: var(--text);
      background: #fff;
      border: 1px solid var(--border);
    }

    .meta {
      margin-top: 22px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .hint {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    code.inline {
      background: #f4f7fc;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px 6px;
      font-size: 0.9em;
      color: var(--primary);
    }

    @media (max-width: 520px) {
      .card {
        padding: 24px 18px;
      }

      .logo {
        width: 100px;
        height: 100px;
        border-radius: 22px;
      }
    }
  </style>
</head>

    function isIOS() {
      return /iPhone|iPad|iPod/i.test(ua) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function isAndroid() {
      return /Android/i.test(ua);
    }

    function setButtonTargets() {
      appStoreBtn.href = STORE_LINKS.ios;
      playStoreBtn.href = STORE_LINKS.android;
    }

    function updatePrimaryButton(href, text) {
      primaryButton.href = href;
      primaryButton.textContent = text;
    }

    function redirectToStore() {
      setButtonTargets();

      if (isIOS()) {
        statusEl.textContent = "iPhone/iPad oppdaget. Sender til App Store …";
        updatePrimaryButton(STORE_LINKS.ios, "Åpne i App Store");
        window.location.replace(STORE_LINKS.ios);
        return;
      }

      if (isAndroid()) {
        statusEl.textContent = "Android oppdaget. Sender til Google Play …";
        updatePrimaryButton(STORE_LINKS.android, "Åpne i Google Play");
        window.location.replace(STORE_LINKS.android);
        return;
      }

      statusEl.textContent = "Ukjent enhet. Bruk knappene under for å velge butikk manuelt.";
      updatePrimaryButton("#", "Velg butikk manuelt");
    }

    primaryButton.addEventListener("click", function (event) {
      if (primaryButton.getAttribute("href") === "#") {
        event.preventDefault();
      }
    });

    redirectToStore();
  </script>
</body>
</html>
